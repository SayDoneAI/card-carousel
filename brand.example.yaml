# 作者品牌资产 — 跨模板复用
# 复制此文件为 brand.yaml 并填入自己的信息
# brand.yaml 已加入 .gitignore，不会提交到 git

author:
  character_desc: "画面右下角有一个Q版卡通小人：你的外貌特征描述"
  # character_desc 优先级: content yaml > template defaults > brand.yaml
  # 模板 style_prompt 中可用 {character} 占位符控制人物描述的插入位置
  # 推荐用纯文字 character_desc 替代 img2img 参考图，效果更好且风格更一致

voice:
  provider: volcengine
  voice_type: S_hIPCxNdV1           # 克隆音色 ID（火山引擎 mega_tts）
  cluster: volcano_mega            # 克隆音色用 volcano_mega cluster
  # 不填 voice 则使用默认预设音色 zh_male_ruyayichen_uranus_bigtts（volcano_tts cluster）
