name: minimal-insight
description: "极简洞见 — 竖屏白底大字卡片 + 水墨插画 + 底栏标签"

layout:
  font: "PingFang SC"
  pixel_height: 1440
  wrap_chars: 9
  max_chars_per_card: 18
  illustration_size: 4.0
  font_size: 44
  colors:
    bg: "#FFFFFF"
    text: "#000000"
    accent: "#C0392B"
    pinyin: "#000000"
    muted: "#999999"
    bar_bg: "#DBDADB"
    bar_text: "#1A1A1A"

brand_defaults:
  logo_char: "赋"
  author: "@黄赋"
  topic: "深度思考"
  pinyin: "HUANG FU"
  disclaimer: "个人观点\n仅供参考"
  footer_tags:
    - "强者思维 ｜ 认知进化 ｜ 深度思考"
    - "内核重构 ｜ 心智跃迁 ｜ 底层逻辑"

positionable_elements:
  - id: "logo"
    label: "Logo 圆圈"
    default_x: 10.0
    default_y: 7.8
    min_x: 0
    max_x: 30
    min_y: 0
    max_y: 20
    step: 0.5

  - id: "author_name"
    label: "作者名"
    default_x: 27.5
    default_y: 7.8
    min_x: 10
    max_x: 50
    min_y: 0
    max_y: 20
    step: 0.5

  - id: "topic_text"
    label: "主题句"
    default_x: 50.0
    default_y: 17.2
    min_x: 0
    max_x: 100
    min_y: 5
    max_y: 30
    step: 0.5

  - id: "pinyin_text"
    label: "拼音"
    default_x: 50.0
    default_y: 32.0
    min_x: 0
    max_x: 100
    min_y: 15
    max_y: 40
    step: 0.5
    flow_layout: true

  - id: "illustration"
    label: "插画"
    default_x: 50.0
    default_y: 55.0
    min_x: 0
    max_x: 100
    min_y: 40
    max_y: 80
    step: 1.0
    flow_layout: true

  - id: "disclaimer"
    label: "免责声明"
    default_x: 81.2
    default_y: 85.6
    min_x: 50
    max_x: 100
    min_y: 70
    max_y: 95
    step: 0.5

  - id: "footer_bar"
    label: "底栏背景"
    default_x: 50.0
    default_y: 95.0
    min_x: 0
    max_x: 100
    min_y: 90
    max_y: 100
    step: 0.5

