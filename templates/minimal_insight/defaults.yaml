name: minimal-insight
description: "极简洞见 — 竖屏白底大字卡片 + 水墨插画 + 底栏标签"

canvas:
  pixel_width: 1080
  pixel_height: 1440

layout:
  font: "PingFang SC"
  wrap_chars: 9
  max_chars_per_card: 18
  pixel_height: 1440
  illustration_size: 4.0
  font_size: 44
  background:
    type: "gradient"
    direction: "vertical"
    stops:
      - { position: 0, color: "#FFFFFF" }
      - { position: 50, color: "#FAFAFA" }
      - { position: 100, color: "#F5F5F5" }
  colors:
    bg: "#FFFFFF"
    text: "#000000"
    accent: "#C0392B"
    subtitle: "#C0392B"
    pinyin: "#000000"
    muted: "#999999"
    bar_bg: "#DBDADB"
    bar_text: "#1A1A1A"

brand_defaults:
  logo_char: "赋"
  author: "@黄赋"
  topic: "深度思考"
  pinyin: "HUANG FU"
  disclaimer: "个人观点\n仅供参考"
  footer_tags:
    - "强者思维 ｜ 认知进化 ｜ 深度思考"
    - "内核重构 ｜ 心智跃迁 ｜ 底层逻辑"

color_palettes:
  # ── 浅色系（柔和渐变） ──
  - name: "经典黑白"
    colors: { bg: "#FFFFFF", text: "#1A1A1A", accent: "#C0392B", subtitle: "#C0392B", pinyin: "#333333", muted: "#999999", bar_bg: "#DBDADB", bar_text: "#1A1A1A" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#FFFFFF" }
        - { position: 50, color: "#FAFAFA" }
        - { position: 100, color: "#F5F5F5" }
  - name: "清新薄荷"
    colors: { bg: "#F0FDF4", text: "#14532D", accent: "#10B981", subtitle: "#059669", pinyin: "#047857", muted: "#9CA3AF", bar_bg: "#D1FAE5", bar_text: "#065F46" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#F0FDF4" }
        - { position: 50, color: "#E7FCED" }
        - { position: 100, color: "#DEFBE7" }
  - name: "柔雾薰衣草"
    colors: { bg: "#FAF5FF", text: "#4C1D95", accent: "#8B5CF6", subtitle: "#7C3AED", pinyin: "#6D28D9", muted: "#A78BFA", bar_bg: "#EDE9FE", bar_text: "#5B21B6" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#FAF5FF" }
        - { position: 50, color: "#F5EBFF" }
        - { position: 100, color: "#F0E1FF" }
  - name: "暖桃微光"
    colors: { bg: "#FFF5F5", text: "#4A1D1D", accent: "#E8604C", subtitle: "#D94F3E", pinyin: "#9B3A2E", muted: "#C4A0A0", bar_bg: "#FFE4E1", bar_text: "#6B2B2B" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#FFF5F5" }
        - { position: 50, color: "#FFEBEB" }
        - { position: 100, color: "#FFE1E1" }
  # ── 暖色氛围系 ──
  - name: "冬日暖阳"
    colors: { bg: "#3D2B1F", text: "#FFF8E7", accent: "#E8B86D", subtitle: "#F5DEB3", pinyin: "#D4A96A", muted: "#8B7355", bar_bg: "#4A3728", bar_text: "#F5DEB3" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#5C4033" }
        - { position: 50, color: "#4E3829" }
        - { position: 100, color: "#3D2B1F" }
  - name: "日落琥珀"
    colors: { bg: "#2D1810", text: "#FFE8D6", accent: "#FF8C42", subtitle: "#FFB07C", pinyin: "#E0976A", muted: "#7A5C4A", bar_bg: "#3A2218", bar_text: "#FFB07C" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#4A2E20" }
        - { position: 50, color: "#3A2218" }
        - { position: 100, color: "#2D1810" }
  - name: "焦糖拿铁"
    colors: { bg: "#2C1E14", text: "#F5E6D3", accent: "#C89B7B", subtitle: "#DEB99F", pinyin: "#B8977A", muted: "#6D5647", bar_bg: "#3A2A1E", bar_text: "#DEB99F" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#4A3828" }
        - { position: 50, color: "#3A2A1E" }
        - { position: 100, color: "#2C1E14" }
  # ── 暗色高级系 ──
  - name: "极夜蓝紫"
    colors: { bg: "#0F0F1A", text: "#F0E6FF", accent: "#A78BFA", subtitle: "#D4C1FF", pinyin: "#8B7EC8", muted: "#5A5478", bar_bg: "#1E1435", bar_text: "#D4C1FF" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#2A1A4A" }
        - { position: 50, color: "#1E1435" }
        - { position: 100, color: "#0F0F1A" }
  - name: "深邃星空"
    colors: { bg: "#0A192F", text: "#E6F1FF", accent: "#64FFDA", subtitle: "#64FFDA", pinyin: "#8892B0", muted: "#495670", bar_bg: "#112240", bar_text: "#64FFDA" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#1D3461" }
        - { position: 50, color: "#112240" }
        - { position: 100, color: "#0A192F" }
  - name: "赛博暗夜"
    colors: { bg: "#0F0F12", text: "#E0E0E0", accent: "#00F5D4", subtitle: "#00F5D4", pinyin: "#A0A0A5", muted: "#6B6B70", bar_bg: "#1A1A2E", bar_text: "#00F5D4" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#1A1A2E" }
        - { position: 50, color: "#161625" }
        - { position: 100, color: "#0F0F12" }
  - name: "午夜墨绿"
    colors: { bg: "#000000", text: "#C9F0D6", accent: "#4ADE80", subtitle: "#86EFAC", pinyin: "#6EE7A0", muted: "#3D5A45", bar_bg: "#051412", bar_text: "#86EFAC" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#0A1F1A" }
        - { position: 50, color: "#051412" }
        - { position: 100, color: "#000000" }
  - name: "暖金黑"
    colors: { bg: "#121212", text: "#FAFAFA", accent: "#FFD700", subtitle: "#FFD700", pinyin: "#B8860B", muted: "#888888", bar_bg: "#1E1E1E", bar_text: "#FFD700" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#26261C" }
        - { position: 50, color: "#202014" }
        - { position: 100, color: "#121212" }
  - name: "深酒红"
    colors: { bg: "#18000A", text: "#FFD1DC", accent: "#FF2E63", subtitle: "#FF6B8A", pinyin: "#FB7185", muted: "#6B3A3A", bar_bg: "#280014", bar_text: "#FF6B8A" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#3D001F" }
        - { position: 50, color: "#280014" }
        - { position: 100, color: "#18000A" }
  - name: "冷灰炭黑"
    colors: { bg: "#121212", text: "#E0E0E0", accent: "#00D4FF", subtitle: "#00D4FF", pinyin: "#8ECAE6", muted: "#555555", bar_bg: "#1E1E1E", bar_text: "#00D4FF" }
    background:
      type: "gradient"
      direction: "vertical"
      stops:
        - { position: 0, color: "#2B2B2B" }
        - { position: 50, color: "#1A1A1A" }
        - { position: 100, color: "#121212" }

positionable_elements:
  - id: "gradient_overlay"
    type: "gradient_overlay"
    label: "毛玻璃蒙版"
    visible: false
    fixed: true
    default_x: 50.0
    default_y: 50.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0

  - id: "portrait"
    type: "image"
    label: "背景图片"
    visible: false
    source: "layout.background_image"
    width: "full"
    anchor: "top"
    fixed: true
    default_x: 50.0
    default_y: 50.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0

  - id: "logo"
    type: "logo"
    label: "Logo 圆圈"
    visible: true
    default_x: 10.0
    default_y: 7.8
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "logo_char", label: "Logo 文字" }
    color_fields:
      - { key: "text", label: "Logo 颜色" }

  - id: "author_name"
    type: "text"
    label: "作者名"
    visible: true
    default_x: 27.5
    default_y: 7.8
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "author", label: "作者名" }
    font_size_override: 20

  - id: "author_avatar"
    type: "image"
    label: "作者头像"
    visible: false
    source: "layout.author_avatar"
    width: "10%"
    aspect_ratio: "1:1"
    anchor: "none"
    default_x: 18.0
    default_y: 7.8
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    extra_fields:
      - { type: "slider", key: "image.author_avatar.width_percent", label: "头像大小", min: 5, max: 100, step: 1 }
      - { type: "select", key: "image.author_avatar.aspect_ratio", label: "显示比例", options: ["1:1", "3:4", "4:3", "16:9"] }

  - id: "topic"
    type: "text"
    label: "主标题"
    visible: true
    default_x: 50.0
    default_y: 17.2
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "topic", label: "主题文字" }
    color_fields:
      - { key: "accent", label: "主题颜色" }
    font_size_override: 44
    weight: "heavy"

  - id: "subtitle"
    type: "text"
    label: "副标题"
    visible: false
    default_x: 50.0
    default_y: 22.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "subtitle", label: "副标题文字" }
    color_fields:
      - { key: "accent", label: "副标题颜色" }
    font_size_override: 28
    weight: "heavy"

  - id: "pinyin_text"
    type: "text"
    label: "拼音"
    visible: true
    default_x: 50.0
    default_y: 32.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    brand_field: { key: "pinyin", label: "拼音文字" }
    color_fields:
      - { key: "pinyin", label: "拼音颜色" }
    font_size_override: 16

  - id: "illustration"
    type: "illustration"
    label: "插画"
    visible: true
    aspect_ratio: "3:4"
    default_x: 50.0
    default_y: 55.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    extra_fields:
      - { type: "slider", key: "layout.illustration_size", label: "插画大小", min: 2.0, max: 8.0, step: 0.5 }
      - { type: "select", key: "illustration.aspect_ratio", label: "插画比例", options: ["1:1", "3:4", "4:3", "16:9", "9:16"] }
      - type: "select"
        key: "animation.illustration"
        label: "切换动画"
        options:
          - { value: "slide", label: "滑动切换" }
          - { value: "fade", label: "淡入淡出" }
          - { value: "none", label: "直接替换" }

  - id: "caption"
    type: "caption"
    label: "字幕"
    visible: true
    default_x: 50.0
    default_y: 75.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    extra_fields:
      - type: "select"
        key: "animation.caption"
        label: "切换动画"
        options:
          - { value: "replace", label: "直接替换" }
          - { value: "fade", label: "淡入淡出" }
          - { value: "typewriter", label: "打字机效果" }

  - id: "disclaimer"
    type: "text"
    label: "免责声明"
    visible: true
    default_x: 81.2
    default_y: 85.6
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "disclaimer", label: "免责文字", multiline: true }
    color_fields:
      - { key: "muted", label: "免责颜色" }
    font_size_override: 14

  - id: "footer_bar"
    type: "bar"
    label: "底栏背景"
    visible: true
    default_x: 50.0
    default_y: 95.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    color_fields:
      - { key: "bar_bg", label: "底栏背景色" }
      - { key: "bar_text", label: "底栏文字色" }
    has_footer_tags: true
