positionable_elements:
  - id: "gradient_overlay"
    type: "gradient_overlay"
    label: "毛玻璃蒙版"
    visible: false
    fixed: true
    default_x: 50.0
    default_y: 50.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0

  - id: "portrait"
    type: "image"
    label: "背景图片"
    visible: false
    source: "layout.background_image"
    width: "full"
    anchor: "top"
    fixed: true
    default_x: 50.0
    default_y: 50.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0

  - id: "logo"
    type: "logo"
    label: "Logo 圆圈"
    visible: false
    default_x: 10.0
    default_y: 5.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "logo_char", label: "Logo 文字" }
    color_fields:
      - { key: "text", label: "Logo 颜色" }

  - id: "author_name"
    type: "text"
    label: "作者名"
    visible: false
    default_x: 27.5
    default_y: 5.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "author", label: "作者名" }
    font_size_override: 20

  - id: "author_avatar"
    type: "image"
    label: "作者头像"
    visible: true
    source: "layout.author_avatar"
    width: "60%"
    aspect_ratio: "3:4"
    anchor: "none"
    default_x: 50.0
    default_y: 25.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    extra_fields:
      - { type: "slider", key: "image.author_avatar.width_percent", label: "头像大小", min: 5, max: 100, step: 1 }
      - { type: "select", key: "image.author_avatar.aspect_ratio", label: "显示比例", options: ["1:1", "3:4", "4:3", "16:9"] }

  - id: "topic"
    type: "text"
    label: "主标题"
    visible: true
    default_x: 50.0
    default_y: 25.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "topic", label: "主题文字" }
    color_fields:
      - { key: "accent", label: "主题颜色" }
    font_size_override: 44
    weight: "heavy"

  - id: "subtitle"
    type: "text"
    label: "副标题"
    visible: true
    default_x: 50.0
    default_y: 75.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    brand_field: { key: "subtitle", label: "副标题文字" }
    color_fields:
      - { key: "subtitle", label: "副标题颜色" }
    font_size_override: 28
    weight: "heavy"

  - id: "pinyin_text"
    type: "text"
    label: "拼音"
    visible: false
    default_x: 50.0
    default_y: 32.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    brand_field: { key: "pinyin", label: "拼音文字" }
    color_fields:
      - { key: "pinyin", label: "拼音颜色" }
    font_size_override: 16

  - id: "illustration"
    type: "illustration"
    label: "插画"
    visible: true
    width_percent: 100
    aspect_ratio: "16:9"
    default_x: 50.0
    default_y: 45.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    extra_fields:
      - { type: "slider", key: "layout.illustration_size", label: "插画大小", min: 3.0, max: 9.0, step: 0.5 }
      - { type: "select", key: "illustration.aspect_ratio", label: "插画比例", options: ["1:1", "3:4", "4:3", "16:9", "9:16"] }
      - type: "toggle"
        key: "illustrations.remove_bg"
        label: "去除背景"
      - type: "select"
        key: "animation.illustration"
        label: "切换动画"
        options:
          - { value: "slide", label: "滑动切换" }
          - { value: "fade", label: "淡入淡出" }
          - { value: "none", label: "直接替换" }

  - id: "caption"
    type: "caption"
    label: "字幕"
    visible: true
    default_x: 50.0
    default_y: 67.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    flow_layout: true
    extra_fields:
      - type: "select"
        key: "animation.caption"
        label: "切换动画"
        options:
          - { value: "replace", label: "直接替换" }
          - { value: "fade", label: "淡入淡出" }
          - { value: "typewriter", label: "打字机效果" }

  - id: "disclaimer"
    type: "text"
    label: "免责声明"
    visible: false
    default_x: 81.2
    default_y: 90.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    brand_field: { key: "disclaimer", label: "免责文字", multiline: true }
    color_fields:
      - { key: "muted", label: "免责颜色" }
    font_size_override: 14

  - id: "footer_bar"
    type: "bar"
    label: "底栏背景"
    visible: false
    default_x: 50.0
    default_y: 95.0
    min_x: 0
    max_x: 100
    min_y: 0
    max_y: 100
    step: 1.0
    color_fields:
      - { key: "bar_bg", label: "底栏背景色" }
      - { key: "bar_text", label: "底栏文字色" }
    has_footer_tags: true
