name: portrait-notebook
description: "人像卡片 — 真人照片背景 + AI插画 + 字幕"

illustrations:
  engine: gemini
  model: gemini-3.1-flash-image-preview
  fallback_engines:
    - kling
    - doubao
  fallback_models:
    - kling-v3
    - doubao-seedream-5-0-260128
  remove_bg: false
  use_character: true
  use_reference_image: false
  style_prompt: "手绘笔记风格信息图，白色背景上用黑色线条绘制。用图标、箭头、流程图、简笔画等视觉符号表达概念，尽量少写文字，多用图形符号。黑色为主要线条，红色强调重点。构图清晰有逻辑，填满画布。纯白背景高对比度，不使用渐变阴影和3D效果。极简手绘信息图表风格。{character}"

canvas:
  pixel_width: 1080
  pixel_height: 1920

layout:
  font: "PingFang SC"
  wrap_chars: 12
  max_chars_per_card: 24
  pixel_height: 1920
  illustration_size: 6.3
  background_image: ""
  font_size: 32
  author_avatar: "assets/huangfu.png"
  background:
    type: "gradient"
    direction: "vertical"
    stops:
      - { position: 0, color: "#2A1A4A" }
      - { position: 50, color: "#1E1435" }
      - { position: 100, color: "#0F0F1A" }
  colors:
    bg: "#0F0F1A"
    text: "#F0E6FF"
    accent: "#A78BFA"
    subtitle: "#D4C1FF"
    pinyin: "#8B7EC8"
    muted: "#5A5478"
    bar_bg: "#1E1435"
    bar_text: "#D4C1FF"

brand_defaults:
  topic: "AI生存指南 ①（企业篇）"
  subtitle: "企业人工智能转型三个目标"

