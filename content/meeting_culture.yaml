  - name: Scene02_Cards
    narration: |
      所以会议的问题，根在1号位身上。
      你随意延误，负责人们随意延误。
      你开会漫无目的，下面的会找不到方向。
      会议的水位，是从上往下渗的。
      开会之前，先问三个问题：
      这场会有没有值得开会的核心目标？
      参会的人都对目标有帮助吗？
      有没有更高效的方式可以替代？
      能省的会，先省。这是最直接的提效。
      更深的一层：改会议，本质上是在改文化。
      这不是一次培训、一套工具能解决的事。
      是你每一次主持会议的方式，一场一场积累出来的。
      你超过90%的决策，都发生在会议室里。
      把会议当正事，才有资格要求它有结果。
      你上一次主动取消一场会议，是什么时候？
