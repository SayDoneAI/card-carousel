template: minimal-insight
title: "为什么你的会议开了和没开一样"

brand:
  topic: "改会议，本质上是在改文化。"

voice:
  provider: volcengine
  voice_type: zh_male_ruyayichen_uranus_bigtts
  cluster: volcano_tts
  speed: 1.0

illustrations:
  enabled: true
  engine: gemini
  model: gemini-3.1-flash-image-preview
  fallback_engine: doubao
  fallback_model: doubao-seedream-5-0-260128
  style_prompt: "Hand-drawn sketch illustration with thick bold black ink lines, rough expressive brushstroke style, like a confident pen drawing in a notebook. Pure white background, no shading, no fill, just thick black outlines. The subject should clearly illustrate the concept: centered composition, no border, no frame, no text. High contrast, bold strokes visible at small size"
  cache_dir: ".cache/illustrations"
  gen_tool: "tools/image_gen.py"

output:
  speed: 1.3

scenes:
  - name: Scene01_Cards
    narration: |
      去一家公司做教练之前，我有个固定动作：先旁听他们的核心团队会议。
      不用看任何报告，坐进会议室一个小时，我基本能判断这家公司的管理水平。
      谁敢说话，谁在发呆，老板一开口其他人是停下来还是继续看手机。
      会议，是一家公司管理文化的原片。
      先算一笔账：
      参会人数×会议时长×平均时薪=会议成本。
      5个负责人，开2小时，每人时薪250元，这场会花了你2500块。
      这还只是直接成本，不包括会议拖延带来的后续连锁影响。
      如果你的会议有投资回报率，是盈利还是亏损？
      改不好会议的原因，大多数老板找错了方向。
      设议程、控时长、写流程，我见过所有这些方法，贴在白板上，开完会没人看第二眼。
      一段时间之后，一切回原样。
      人不变，会议不变。流程是术，人是道。
    illustration_keywords:
      - coach observing meeting room
      - null
      - people in meeting distracted on phone
      - null
