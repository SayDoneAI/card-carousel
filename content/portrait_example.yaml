# 内容配置示例 — 使用 portrait-notebook 模板
title: "黄赋-AI生存指南01"
template: portrait-notebook

# 覆盖模板品牌默认值（可选）
brand:
  logo_char: "赋"
  author: "@黄赋"
  topic: "AI生存指南 ①（企业篇）"
  subtitle: "企业人工智能转型三个目标"

voice:
  provider: volcengine
  voice_type: zh_male_ruyayichen_uranus_bigtts
  cluster: volcano_tts
  speed: 1.0

illustrations:
  enabled: true
  engine: doubao
  model: doubao-seedream-5-0-260128
  input_image: "assets/huangfu.png"
  strength: 0.3
  style_prompt: "将参考图中的光头男性人物绘制为Q版卡通小人，保持光头特征，放在画面一角做讲解动作。手绘笔记风格草图，白色笔记本纸上用马克笔绘制。用图标、箭头、流程图、简笔画等视觉符号表达概念，尽量少写文字，多用图形符号。黑色为主要线条，红色强调重点，可少量绿色黄色装饰。构图清晰有逻辑，填满画布，元素间留足空间。纯白背景高对比度，不使用渐变阴影和3D效果。极简手绘信息图表风格"
  cache_dir: ".cache/illustrations"
  gen_tool: "tools/image_gen.py"

output:
  speed: 1.0
  format: mp4

scenes:
  - name: PortraitNotebookScene
    narration: |
      企业引入AI的第一个目标是降低成本
      第二个目标是提升效率
      第三个目标是创造新的商业价值
    illustration_keywords:
      - cost reduction AI
      - efficiency improvement
      - business value creation
