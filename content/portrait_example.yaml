# 内容配置示例 — 使用 portrait-notebook 模板
title: "黄赋-AI生存指南01"
template: portrait-notebook

# 覆盖模板品牌默认值（可选）
brand:
  logo_char: "赋"
  author: "@黄赋"
  topic: "AI生存指南 ①（企业篇）"
  subtitle: "企业人工智能转型三个目标"

voice:
  provider: volcengine
  voice_type: zh_male_ruyayichen_uranus_bigtts
  cluster: volcano_tts
  speed: 1.0

illustrations:
  enabled: true
  engine: doubao
  model: doubao-seedream-5-0-260128
  input_image: "assets/huangfu.png"
  style_prompt: "Bold black marker sketch on white notebook page with spiral binding on left side, rough hand-drawn infographic style, black ink lines with red accent marks, diagram and chibi cartoon character illustration, white paper background, no color fill"
  cache_dir: ".cache/illustrations"
  gen_tool: "tools/image_gen.py"

output:
  speed: 1.0
  format: mp4

scenes:
  - name: PortraitNotebookScene
    narration: |
      企业引入AI的第一个目标是降低成本
      第二个目标是提升效率
      第三个目标是创造新的商业价值
    illustration_keywords:
      - cost reduction AI
      - efficiency improvement
      - business value creation
