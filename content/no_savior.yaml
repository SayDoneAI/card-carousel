  - name: Scene02_Cards
    narration: |
      但真正的转折点，往往不是救星出现的那天，而是你彻底死了被救的心的那天。
      当你不再等，你才能真正看清自己有什么。当你不再靠，你才能发现自己能做什么。
      毛毛虫化蝶，不是直接长出翅膀，而是在茧里把旧的身体彻底溶解，再重新长出新的器官。这个过程没有捷径，没有人可以替你完成。
      没有人会来救你。
      这意味着，也没有任何人能够阻止你。
      你现在还在等什么？
      我是黄赋，我愿成为你创业路上的向导，让你少走无谓的弯路。
      关注我，陪你打怪升级。
