template: dark-card
title: "你是谁比你会什么更重要"

brand:
  title_text: "你是谁比你会什么更重要"
  author: "@黄赋"
  slogan: "关注我，陪你打怪升级"

voice:
  provider: volcengine
  voice_type: zh_male_ruyayichen_uranus_bigtts
  cluster: volcano_tts
  speed: 1.0

illustrations:
  enabled: true
  engine: gemini
  model: gemini-3.1-flash-image-preview
  fallback_engines:
    - kling
    - doubao
  fallback_models:
    - kling-v3
    - doubao-seedream-5-0-260128
  use_character: false
  use_reference_image: false
  cache_dir: ".cache/illustrations"
  gen_tool: "tools/image_gen.py"

output:
  speed: 1.0

scenes:
  - name: DarkCardScene
    narration: |
      AI来了，很多人开始拼命学工具。
      每出一个新工具，就去试一试。
      还有人开始焦虑：AI会替代我吗？
      这两种反应，我都理解。
      但方向都错了。
      把「做什么」当护城河，危险。
    illustration_keywords:
      - 创业者盯着屏幕疯狂记笔记
      - null
      - 人站在镜子前镜中是机器人
      - null
      - 人站在一道矮墙前以为是城堡
      - null
