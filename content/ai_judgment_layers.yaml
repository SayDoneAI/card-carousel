  - name: Scene02_Cards
    narration: |
      AI最容易学会的，就是这一层
      底层：一线判断
      判断这个客户今天心情怎么样
      这个员工靠不靠谱
      需要现场感、人际敏感度
      AI也做不了
      AI替代不了顶层和底层
      但可以替代中间层
      为什么？
      因为中间层的判断，最容易被标准化
      有套路有框架有方法论的东西，AI学得最快
      AI学会之后
      比你做得更快、更稳定、更便宜
