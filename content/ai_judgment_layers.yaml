scenes:
  - name: Scene01_Cards
    narration: |
      你做了十几年
      AI出来后，你开始怀疑
      我的经验还值钱吗？
      答案是：看你的判断力在哪一层
      判断力分三层
      顶层：战略判断
      判断方向对不对，该不该做
      需要视野、经验、对趋势的感知
      AI暂时做不了
      中层：执行判断
      判断怎么做，怎么拆解，怎么优化
      这是标准化的专业判断
      有框架、有套路
