scenes:
  - name: Scene01_Cards
    narration: |
      一个奥地利工程师，周末一个人做了个项目
      几天后，GitHub上10万颗星
      OpenAI直接把他挖走了
      这就是OpenClaw，外号叫小龙虾
      朋友圈炸了，群里炸了，见面都在问：你养了吗
      我也装了
      然后我想通了一件事
      先说这只龙虾，真正动了什么
      历次技术革命，打的都是基础操作层
      工厂机械化打掉流水线工人，电商崛起打掉线下导购
      但有一层人，一直活得很好
      项目经理、执行总监、部门主管
      他们的工作：理解上级，拆任务，协调资源，推进，汇报
      Agent出来之后，这个逻辑不成立了
      Agent的工作流，和他们一字不差
      老板一句话，Agent拆成10个任务并行跑，比5个人还快，还不请假
      第二刀，打的是信息差生意
      中介、猎头、广告代理、咨询，任何靠我知道你不知道赚钱的，全在射程里
    illustration_keywords:
