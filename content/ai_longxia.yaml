  - name: Scene02_Cards
    narration: |
      但我装完之后，看到了另一面
      大多数人装龙虾，不是因为有问题要解决
      是因为周围人在装，怕落伍，怕错过
      吭哧吭哧折腾几天，发个朋友圈，然后没有然后了
      这哪是养AI，是AI在养你——养你的焦虑
      装龙虾值不值，取决于一个前置条件
      你的工作流，跑通了吗
      如果你连要自动化什么都不知道，Agent帮不了你
      我现在主要用Claude，效率提升超过10倍
      做教练纪要，以前手搓要两三个小时
      现在三十分钟搞定，还比以前做的好看
      不是工具多厉害，是我清楚每一步要做什么
      你现在的工作，AI含量是多少
      不是装了几个工具，而是AI在跑、你在审的比例有多高
      AI是个人杠杆，效用等于你自己的n次方
      你大于1，AI把你放大；你小于等于1，AI把你缩小
      先把工作流跑通，自动化才有意义
      本周四下午，我有一个创业下午茶，就聊这件事——你的AI含量是多少
