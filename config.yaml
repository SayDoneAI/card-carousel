title: "黄赋"
manim_script: "explainer.py"
render_quality: "l"

voice:
  provider: volcengine
  voice_type: zh_male_ruyayichen_uranus_bigtts
  cluster: volcano_tts
  speed: 1.0

output:
  speed: 1.0
  format: mp4

# 插画配置
illustrations:
  enabled: true
  engine: doubao
  model: doubao-seedream-5-0-260128
  style_prompt: "Minimalist line drawing illustration, black ink with red accents only, simple clean sketch on pure white background, no background elements, no border, no frame, no text, centered composition, the illustration should seamlessly blend into a white page"
  cache_dir: ".cache/illustrations"
  gen_tool: "tools/image_gen.py"

# 品牌/固定元素
brand:
  logo_char: "赋"                              # 圆圈 logo 里的字
  author: "@黄赋"                                # 作者名
  topic: "在专业面前像学徒，在困难面前像王者"    # 红色主题句（固定）
  pinyin: "HUANG FU"
  disclaimer: "个人观点\n仅供参考"
  footer_tags:
    - "强者思维 ｜ 认知进化 ｜ 深度思考"
    - "内核重构 ｜ 心智跃迁 ｜ 底层逻辑"

scenes:
  - name: Scene01_Cards
    narration: |
      真正阻碍一个人成长的从来不是能力不足
      而是认知顺序的严重错位
      他们把该敬畏的东西当成了敌人
      把该轻视的东西却供奉成了洪水猛兽
      面对专业他们毫无敬畏总觉得差不多就行了
      试图用廉价的勤奋代替深度的思考
      用走捷径的快感掩盖底蕴的缺失
      还没出发就开始在大脑中预演一万种失败的可能
      一个人的生命状态必然是扭曲的
      在该精进的地方选择了平庸
      在该破局的地方选择了退缩
      要有如履薄冰的谦卑
      在困难面前要有目空一切的狂妄
      我们要对反馈建立一个新的认知
    illustration_keywords:
      - growth obstacle
      - null
      - shield and sword
      - null
      - notebook
      - null
      - mountain path
      - null
      - twisted tree
      - null
      - null
      - thin ice walking
      - lion roaring
      - null
